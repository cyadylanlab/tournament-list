<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026–27 Tournament List — Virginia Valor FC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #a67c00;
    --gold-dim: #a67c0066;
    --gold-bg: rgba(166,124,0,0.07);
    --bg: #f5f5f5;
    --bg2: #ffffff;
    --bg3: #f0f0f0;
    --border: #e0e0e0;
    --text: #111111;
    --muted: #444444;
    --muted2: #888888;
    --green: #166534;
    --yellow: #92400e;
    --red: #991b1b;
    --blue: #1d4ed8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 22px;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .header-eyebrow span:first-child {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--gold);
  }
  .header-eyebrow .dot { color: var(--muted2); font-size: 11px; }
  .header-eyebrow .season {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 0.06em;
    color: #111;
    line-height: 1;
  }
  .stats {
    display: flex;
    gap: 24px;
  }
  .stat { text-align: center; }
  .stat-val {
    font-size: 26px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── MONTH TABS ── */
  .tabs-wrap {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    padding: 0 32px;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted2);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.14em;
    padding: 14px 16px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn:hover { color: var(--muted); }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }
  .tab-count {
    font-size: 10px;
    background: #e8e8e8;
    color: var(--muted2);
    border-radius: 10px;
    padding: 1px 6px;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    transition: all 0.15s;
  }
  .tab-btn.active .tab-count {
    background: var(--gold-bg);
    color: var(--gold);
  }

  /* ── CONTENT AREA ── */
  .content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 32px 60px;
  }

  /* ── MONTH HEADER ── */
  .month-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 18px;
  }
  .month-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 0.08em;
    color: #111;
  }
  .month-deadline {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .month-deadline strong { color: var(--gold); }
  .deadline-icon { color: var(--gold-dim); }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .search-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 5px 10px;
    font-size: 12.5px;
    font-family: 'Barlow', sans-serif;
    outline: none;
    width: 150px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--gold-dim); }
  .search-input::placeholder { color: var(--muted2); }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted2);
    font-size: 11px;
    font-weight: 700;
    font-family: 'Barlow', sans-serif;
    letter-spacing: 0.03em;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { color: var(--muted); border-color: #ccc; }
  .filter-btn.active-all { background: #e8e8e8; border-color: #ccc; color: var(--text); }
  .filter-btn.active-recommended { background: rgba(22,101,52,0.08); border-color: rgba(22,101,52,0.3); color: var(--green); }
  .filter-btn.active-be-aware { background: rgba(146,64,14,0.08); border-color: rgba(146,64,14,0.3); color: var(--yellow); }
  .filter-btn.active-club-event { background: rgba(29,78,216,0.08); border-color: rgba(29,78,216,0.3); color: var(--blue); }
  .filter-btn.active-not-recommended { background: rgba(153,27,27,0.08); border-color: rgba(153,27,27,0.3); color: var(--red); }

  /* ── TABLE ── */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead tr {
    background: #1a1a1a;
  }
  th {
    padding: 9px 14px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #e5e7eb;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
  }
  tbody tr.data-row {
    border-top: 1px solid #ebebeb;
    transition: background 0.12s;
    cursor: default;
  }
  tbody tr.data-row:first-child { border-top: none; }
  tbody tr.data-row.has-notes { cursor: pointer; }
  tbody tr.data-row:hover { background: var(--gold-bg); }
  tbody tr.data-row.even { background: rgba(0,0,0,0.02); }
  tbody tr.data-row.even:hover { background: var(--gold-bg); }

  td {
    padding: 9px 14px;
    vertical-align: middle;
  }
  .td-date {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
    min-width: 90px;
  }
  .td-name {
    font-weight: 600;
    font-size: 13.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .expand-arrow {
    font-size: 9px;
    color: var(--gold);
    opacity: 0.5;
    transition: opacity 0.15s, transform 0.2s;
    flex-shrink: 0;
  }
  .expand-arrow.open { opacity: 1; transform: rotate(180deg); }
  .td-location {
    color: var(--muted);
    font-size: 12.5px;
    min-width: 140px;
  }
  .td-levels { min-width: 160px; }
  .levels-wrap { display: flex; flex-wrap: wrap; gap: 3px; }

  /* Level badges */
  .level-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .level-ecnl { background: #a67c00; color: #fff; }
  .level-gold { background: #d4a017; color: #fff; }
  .level-white { background: #fff; color: #111; border: 1px solid #ccc; }
  .level-black { background: #1f2937; color: #fff; }
  .level-silver { background: #6b7280; color: #fff; }

  /* Status badges */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    white-space: nowrap;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .status-recommended { background: rgba(22,101,52,0.08); color: var(--green); border: 1px solid rgba(22,101,52,0.25); }
  .status-not-recommended { background: rgba(153,27,27,0.08); color: var(--red); border: 1px solid rgba(153,27,27,0.25); }
  .status-be-aware { background: rgba(146,64,14,0.08); color: var(--yellow); border: 1px solid rgba(146,64,14,0.25); }
  .status-club-event { background: rgba(29,78,216,0.08); color: var(--blue); border: 1px solid rgba(29,78,216,0.25); }
  .status-neutral { color: var(--muted2); font-size: 13px; }

  /* Notes row */
  tr.notes-row td {
    padding: 0 14px 10px 14px;
    background: rgba(166,124,0,0.04);
    border-top: none;
  }
  tr.notes-row.hidden { display: none; }
  .notes-content {
    font-size: 12.5px;
    color: #333;
    border-left: 2px solid var(--gold);
    padding-left: 12px;
    line-height: 1.6;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    color: var(--muted2);
    padding: 40px;
    font-size: 13px;
  }

  /* Legend */
  .legend {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .legend-label { font-size: 11px; color: var(--muted2); }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
  }
  .legend-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-hint {
    font-size: 11px;
    color: var(--muted2);
    margin-left: 6px;
  }

  /* ── MOBILE CARDS ── */
  .card-list { display: none; flex-direction: column; gap: 10px; }
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: default;
    transition: box-shadow 0.15s;
  }
  .card.has-notes { cursor: pointer; }
  .card:active { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }
  .card-name {
    font-weight: 700;
    font-size: 14px;
    color: #111;
    line-height: 1.3;
    flex: 1;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .card-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .card-location {
    font-size: 12px;
    color: var(--muted);
  }
  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .card-notes {
    display: none;
    margin-top: 10px;
    font-size: 12.5px;
    color: #333;
    border-left: 2px solid var(--gold);
    padding-left: 10px;
    line-height: 1.6;
  }
  .card-notes.open { display: block; }
  .card-arrow {
    font-size: 10px;
    color: var(--gold);
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .card-arrow.open { transform: rotate(180deg); }

  /* Responsive */
  @media (max-width: 700px) {
    .header { padding: 20px 16px 16px; }
    .content { padding: 16px 16px 48px; }
    .tabs { padding: 0 12px; }
    .tab-btn { padding: 12px 12px 10px; font-size: 13px; }
    h1 { font-size: 24px; }
    .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
    .stats { gap: 20px; }
    .stat-val { font-size: 22px; }
    .month-header { flex-direction: column; align-items: flex-start; }
    .filters {
      width: 100%;
      gap: 6px;
    }
    .search-input { width: 100%; }
    .filter-btn { font-size: 10.5px; padding: 5px 8px; }
    /* Hide table, show cards */
    .table-wrap { display: none; }
    .card-list { display: flex; }
    .legend { gap: 12px; }
  }
</style>
</head>

const STATUS_META = {
  recommended:     { label: "Recommended",     icon: "✓", cls: "status-recommended" },
  "not-recommended": { label: "Not Recommended", icon: "✗", cls: "status-not-recommended" },
  "be-aware":      { label: "Be Aware",        icon: "⚠", cls: "status-be-aware" },
  "club-event":    { label: "Club Event",      icon: "★", cls: "status-club-event" },
  neutral:         { label: "—",               icon: "",  cls: "status-neutral" },
};

const LEVEL_CLS = {
  "ECNL-RL": "level-ecnl",
  "Gold":    "level-gold",
  "White":   "level-white",
  "Black":   "level-black",
  "Silver":  "level-silver",
};

let activeMonth = 0;
let activeFilter = "all";

function totalCount() {
  return MONTHS.reduce((a, m) => a + m.tournaments.length, 0);
}
function recCount() {
  return MONTHS.reduce((a, m) => a + m.tournaments.filter(t => t.status === "recommended").length, 0);
}

function buildTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = MONTHS.map((m, i) => `
    <button class="tab-btn ${i === 0 ? "active" : ""}" id="tab-${i}" onclick="switchMonth(${i})">
      ${m.short} <span class="tab-count">${m.tournaments.length}</span>
    </button>
  `).join("");
}

function switchMonth(idx) {
  activeMonth = idx;
  activeFilter = "all";
  document.getElementById("search").value = "";
  document.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", i === idx));
  setFilter("all", false);
  renderMonth();
}

function setFilter(f, doRender = true) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.className = "filter-btn" + (b.dataset.filter === f ? " active-" + f : "");
  });
  if (doRender) applyFilters();
}

function applyFilters() {
  renderMonth();
}

function levelBadge(l) {
  const cls = LEVEL_CLS[l] || "level-black";
  return `<span class="level-badge ${cls}">${l}</span>`;
}

function renderMonth() {
  const m = MONTHS[activeMonth];
  document.getElementById("month-title").textContent = m.label;

  const dl = document.getElementById("month-deadline");
  if (m.deadline) {
    dl.innerHTML = `<span class="deadline-icon">⏱</span> Registration deadline to Beth Morris: <strong>${m.deadline}</strong>`;
    dl.style.display = "flex";
  } else {
    dl.style.display = "none";
  }

  const q = (document.getElementById("search").value || "").toLowerCase();
  const filtered = m.tournaments.filter(t => {
    const matchStatus = activeFilter === "all" || t.status === activeFilter;
    const matchSearch = !q || t.name.toLowerCase().includes(q) || t.location.toLowerCase().includes(q);
    return matchStatus && matchSearch;
  });

  const tbody = document.getElementById("tbody");
  const cardList = document.getElementById("card-list");

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No tournaments match the current filter.</td></tr>`;
    cardList.innerHTML = `<div class="empty-state" style="text-align:center;padding:32px;color:#888;">No tournaments match the current filter.</div>`;
    return;
  }

  tbody.innerHTML = filtered.map((t, i) => {
    const sm = STATUS_META[t.status];
    const hasNotes = !!t.notes;
    const evenCls = i % 2 === 0 ? " even" : "";
    const notesCls = hasNotes ? " has-notes" : "";
    const statusHtml = t.status === "neutral"
      ? `<span class="status-neutral">—</span>`
      : `<span class="status-badge ${sm.cls}">${sm.icon} ${sm.label}</span>`;
    const arrowHtml = hasNotes ? `<span class="expand-arrow" id="arrow-${i}">▼</span>` : "";
    const clickAttr = hasNotes ? `onclick="toggleNotes(${i})"` : "";
    return `
      <tr class="data-row${evenCls}${notesCls}" id="row-${i}" ${clickAttr}>
        <td class="td-date">${t.date}</td>
        <td><div class="td-name">${t.name}${arrowHtml}</div></td>
        <td class="td-location">${t.location}</td>
        <td class="td-levels"><div class="levels-wrap">${t.levels.map(levelBadge).join("")}</div></td>
        <td>${statusHtml}</td>
      </tr>
      ${hasNotes ? `<tr class="notes-row hidden" id="note-${i}"><td colspan="5"><div class="notes-content">${t.notes}</div></td></tr>` : ""}
    `;
  }).join("");

  cardList.innerHTML = filtered.map((t, i) => {
    const sm = STATUS_META[t.status];
    const hasNotes = !!t.notes;
    const notesCls = hasNotes ? " has-notes" : "";
    const statusHtml = t.status === "neutral"
      ? `<span class="status-neutral" style="font-size:12px;">—</span>`
      : `<span class="status-badge ${sm.cls}">${sm.icon} ${sm.label}</span>`;
    const clickAttr = hasNotes ? `onclick="toggleCard(${i})"` : "";
    return `
      <div class="card${notesCls}" id="card-${i}" ${clickAttr}>
        <div class="card-top">
          <div class="card-name">${t.name}</div>
          ${hasNotes ? `<span class="card-arrow" id="carrow-${i}">▼</span>` : ""}
        </div>
        <div class="card-meta">
          <span class="card-date">${t.date}</span>
          <span style="color:#ccc;font-size:11px;">·</span>
          <span class="card-location">${t.location}</span>
        </div>
        <div class="card-bottom">
          <div class="levels-wrap">${t.levels.map(levelBadge).join("")}</div>
          ${statusHtml}
        </div>
        ${hasNotes ? `<div class="card-notes" id="cnote-${i}">${t.notes}</div>` : ""}
      </div>
    `;
  }).join("");
}

function toggleNotes(i) {
  const noteRow = document.getElementById("note-" + i);
  const arrow = document.getElementById("arrow-" + i);
  if (!noteRow) return;
  const isHidden = noteRow.classList.contains("hidden");
  noteRow.classList.toggle("hidden", !isHidden);
  if (arrow) arrow.classList.toggle("open", isHidden);
}

function toggleCard(i) {
  const notes = document.getElementById("cnote-" + i);
  const arrow = document.getElementById("carrow-" + i);
  if (!notes) return;
  notes.classList.toggle("open");
  if (arrow) arrow.classList.toggle("open");
}

// Init
document.getElementById("total-count").textContent = totalCount();
document.getElementById("rec-count").textContent = recCount();
buildTabs();
renderMonth();
</script>
